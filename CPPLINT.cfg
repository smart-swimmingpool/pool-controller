# CPPLint configuration for pool-controller project
# Configuration reference: https://github.com/cpplint/cpplint

# Set line length to match .clang-format ColumnLimit
linelength=130

# Disable filters for embedded/Arduino-specific patterns
# - legal/copyright: No copyright headers required for this project
# - build/include_subdir: Arduino libraries don't use subdirectories
# - runtime/int: Arduino uses 'long' type extensively
# - runtime/threadsafe_fn: Single-threaded embedded environment
filter=-legal/copyright,-build/include_subdir,-runtime/int,-runtime/threadsafe_fn
